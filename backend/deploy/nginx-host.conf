# ============================================================================
#  Bloc Nginx SYSTÈME pour Relay — api-chat.hanifcode.fr
#  À placer dans /etc/nginx/sites-available/ puis lier dans sites-enabled/.
#
#  Ce bloc ne gère QUE le port 80 ; certbot --nginx ajoutera automatiquement
#  le bloc 443 (TLS) et la redirection HTTP -> HTTPS.
#
#  Les fichiers statiques (admin) sont servis par WhiteNoise via l'app, donc
#  rien à configurer ici pour /static/.
# ============================================================================

# Le port DOIT correspondre à APP_PORT du docker-compose.app.yml.
upstream relay_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name api-chat.hanifcode.fr;

    client_max_body_size 200m;

    # WebSocket temps réel (WSS après TLS) : upgrade + timeouts longs.
    location /ws/ {
        proxy_pass http://relay_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API REST (et admin).
    location / {
        proxy_pass http://relay_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
