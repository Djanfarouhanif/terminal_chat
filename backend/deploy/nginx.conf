# ============================================================================
#  Nginx — reverse proxy TLS pour Relay (HTTP/REST + WSS temps réel)
#  >>> REMPLACEZ « chat.example.com » par VOTRE domaine (3 occurrences) <<<
# ============================================================================

upstream relay_web {
    server web:8000;
}

# --- HTTP : sert le challenge ACME puis redirige tout vers HTTPS ------------
server {
    listen 80;
    server_name chat.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS : REST + WebSocket ----------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name chat.example.com;

    ssl_certificate     /etc/letsencrypt/live/chat.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 200m;

    # Fichiers statiques (admin Django) servis directement par Nginx.
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }

    # WebSocket temps réel : upgrade + timeouts longs.
    location /ws/ {
        proxy_pass http://relay_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API REST (et le reste).
    location / {
        proxy_pass http://relay_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
