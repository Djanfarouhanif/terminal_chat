services:
  postgres:
    image: postgres:16-alpine
    container_name: hanif-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hanif}
      POSTGRES_USER: ${POSTGRES_USER:-hanif}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hanif}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - hanif_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hanif}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hanif-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - hanif_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  hanif_pgdata:
  hanif_redisdata:
